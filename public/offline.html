<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZychoHub Offline</title>
  <meta name="theme-color" content="#a020f0" />
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#07020f;color:white;font-family:system-ui,-apple-system,Segoe UI,sans-serif;text-align:center;padding:24px}
    .card{max-width:420px;background:#171022;border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
    img{width:92px;height:92px;border-radius:50%;object-fit:cover;margin-bottom:16px}
    h1{margin:0 0 10px;font-size:26px} p{color:rgba(255,255,255,.62);line-height:1.6} button{border:0;border-radius:999px;background:#a020f0;color:white;font-weight:800;padding:13px 20px;margin-top:10px}
  </style>
</head>
<body>
  <div class="card">
    <img src="/zycho-logo.jpg" alt="ZychoHub" />
    <h1>Kamu sedang offline</h1>
    <p>Halaman yang sudah pernah dibuka tetap bisa dipakai dari cache PWA. Sambungkan internet untuk memuat lagu baru.</p>
    <button onclick="location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
