<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ZychoHub Music</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#a020f0" />
    <meta name="description" content="ZychoHub Music - streaming musik modern bergaya Spotify" />
    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZychoHub" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <script>
      window.__zychoDeferredPrompt = null;
      window.__zychoPwaInstalled = false;
      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        window.__zychoDeferredPrompt = event;
        window.dispatchEvent(new Event('zycho-pwa-ready'));
      });
      window.addEventListener('appinstalled', function () {
        window.__zychoPwaInstalled = true;
        window.__zychoDeferredPrompt = null;
        window.dispatchEvent(new Event('zycho-pwa-installed'));
      });
    </script>
    <!-- Open Graph -->
    <meta property="og:title" content="ZychoHub Music" />
    <meta property="og:description" content="Streaming musik modern bergaya Spotify" />
    <meta property="og:image" content="/icons/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered:', reg.scope);
            reg.update();
          }).catch(err => console.log('SW error:', err));
        });
      }
    </script>
  </body>
</html>
